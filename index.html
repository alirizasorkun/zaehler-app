<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhikr Zähler</title>

<style>
body {
  margin: 0;
  background: #3a3a3a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* Schwarzer Kasten */
.box {
  width: 260px;
  height: 360px;
  background: #0b0b0b;
  border-radius: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  position: relative;
}

/* Anzeige */
.display {
  width: 80%;
  background: #ddd;
  border: 3px solid #2ecc40;
  border-radius: 10px;
  text-align: center;
  font-size: 28px;
  padding: 8px;
}

/* Großer Button */
.main-btn {
  margin-top: 60px; /* 🔥 weiter runter */
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  background: radial-gradient(circle at 30% 30%, #6fff6f, #1e8f1e);
}

/* Reset Button oben rechts RAND */
.reset-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #2ecc40;
  color: white;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="box">

  <button class="reset-btn" onclick="resetCounter()">↻</button>

  <div id="counter" class="display">0000</div>

  <button class="main-btn" onclick="clickBtn()">DRÜCKEN</button>

</div>

<script>
let count = 0;

function clickBtn() {
  count++;
  update();
}

function update() {
  document.getElementById("counter").innerText =
    count.toString().padStart(4, '0');
}

function resetCounter() {
  if (confirm("Möchten Sie wirklich neu starten?")) {
    count = 0;
    update();
  }
}
</script>

</body>
</html>
