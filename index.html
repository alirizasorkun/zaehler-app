<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dhikr Zähler</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #3a3a3a;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

button {
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.box {
  width: 260px;
  height: 360px;
  background: #0b0b0b;
  border-radius: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

.display {
  width: 80%;
  background: #ddd;
  border: 3px solid #2ecc40;
  border-radius: 10px;
  text-align: center;
  font-size: 28px;
  padding: 8px;
  color: #000;
  font-weight: bold;
}

.main-btn {
  margin-top: 75px;
  width: 155px;
  height: 155px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  background: radial-gradient(circle at 30% 30%, #6fff6f, #1e8f1e);
  box-shadow: 0 10px 22px rgba(0,0,0,0.45);
}

.reset-btn {
  position: absolute;
  top: 115px;
  right: 25px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: #2ecc40;
  color: white;
  font-size: 18px;
  font-weight: bold;
}

.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  justify-content: center;
  align-items: center;
  z-index: 99;
}

.modal {
  width: 280px;
  background: #151515;
  border-radius: 22px;
  padding: 22px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.modal h2 {
  margin: 0 0 12px;
  font-size: 21px;
}

.modal p {
  margin: 0 0 25px;
  font-size: 16px;
  color: #ddd;
}

.modal-buttons {
  display: flex;
  gap: 16px;
}

.modal-buttons button {
  flex: 1;
  padding: 13px 0;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: bold;
}

.no-btn {
  background: #444;
  color: white;
}

.yes-btn {
  background: #2ecc40;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <div id="counter" class="display">0000</div>

  <button id="mainBtn" class="main-btn">DRÜCKEN</button>

  <button id="resetBtn" class="reset-btn">↻</button>
</div>

<div id="modalBg" class="modal-bg">
  <div class="modal">
    <h2>Zurücksetzen?</h2>
    <p>Möchten Sie wirklich neu starten?</p>

    <div class="modal-buttons">
      <button id="noBtn" class="no-btn">Nein</button>
      <button id="yesBtn" class="yes-btn">Ja</button>
    </div>
  </div>
</div>

<script>
let count = Number(localStorage.getItem("dhikrCounter")) || 0;
const counter = document.getElementById("counter");

function update() {
  counter.innerText = count.toString().padStart(4, "0");
}

function save() {
  localStorage.setItem("dhikrCounter", count);
}

function addCount(e) {
  e.preventDefault();
  count++;
  save();
  update();
}

function openReset(e) {
  e.preventDefault();
  document.getElementById("modalBg").style.display = "flex";
}

function closeReset() {
  document.getElementById("modalBg").style.display = "none";
}

function confirmReset() {
  count = 0;
  save();
  update();
  closeReset();
}

document.getElementById("mainBtn").addEventListener("pointerdown", addCount);
document.getElementById("resetBtn").addEventListener("pointerdown", openReset);
document.getElementById("noBtn").addEventListener("pointerdown", closeReset);
document.getElementById("yesBtn").addEventListener("pointerdown", confirmReset);

update();
</script>

</body>
</html>
