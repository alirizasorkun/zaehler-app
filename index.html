<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhikr Zähler</title>

<style>
body {
  margin: 0;
  background: #303234;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.box {
  background: #111;
  padding: 40px;
  border-radius: 30px;
  text-align: center;
  position: relative;
}

.display {
  background: #ccc;
  border: 4px solid #2db43f;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 40px;
  margin-bottom: 40px;
}

.button {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(#6ef06e, #1a7f1a);
  border: none;
  color: white;
  font-size: 18px;
}

.reset {
  position: absolute;
  right: -20px;
  top: -20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #2db43f;
  border: none;
  color: white;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="box">
  <button class="reset" onclick="resetCounter()">↻</button>

  <div id="counter" class="display">0000</div>

  <button class="button" onclick="clickBtn()">DRÜCKEN</button>
</div>

<script>
let count = 0;

function clickBtn() {
  count++;
  update();
}

function update() {
  document.getElementById("counter").innerText =
    count.toString().padStart(4, '0');
}

function resetCounter() {
  if (confirm("Möchten Sie wirklich neu starten?")) {
    count = 0;
    update();
  }
}
</script>

</body>
</html>
